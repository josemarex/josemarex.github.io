<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolhas Flutuantes</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #282c34;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 40px;
            background: rgba(154, 79, 224, 0.3);
            border-radius: 50%;
            animation: bubbleAnimation 2s linear infinite;
        }

        @keyframes bubbleAnimation {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bubble" style="left: 20%; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 40%; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 60%; animation-delay: 4s;"></div>
    <div class="bubble" style="left: 80%; animation-delay: 6s;"></div>
</body>
</html>
